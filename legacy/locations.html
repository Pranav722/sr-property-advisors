<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects Admin | SR Property Advisors</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="/src/dashboard.css">
</head>

<body>

    <!-- Left Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <div class="sidebar-brand-icon">
                    <i class="ri-building-4-fill" style="font-size: 14px;"></i>
                </div>
                SR Advisory Admin
            </div>
        </div>

        <div class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-title">Menu</div>
                <a href="dashboard.html" class="nav-item">
                    <i class="ri-dashboard-line"></i> Dashboard
                </a>
                <a href="projects-admin.html" class="nav-item">
                    <i class="ri-building-line"></i> Projects
                </a>
                <a href="inventory.html" class="nav-item">
                    <i class="ri-map-pin-line"></i> Plot Inventory
                </a>
                <a href="locations.html" class="nav-item active">
                    <i class="ri-compass-3-line"></i> Locations
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-title">Sales & CRM</div>
                <a href="leads.html" class="nav-item">
                    <i class="ri-inbox-archive-line"></i> Inquiries
                </a>
                <a href="leads.html" class="nav-item">
                    <i class="ri-user-star-line"></i> Leads
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-title">System</div>
                <a href="file-manager.html" class="nav-item">
                    <i class="ri-folder-open-line"></i> File Manager
                </a>
                <a href="index.html" class="nav-item">
                    <i class="ri-global-line"></i> Main Website
                </a>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Top Header -->
        <header class="top-header">
            <div style="display: flex; align-items: center;">
                <button class="mobile-nav-toggle" id="mobileMenuBtn">
                    <i class="ri-menu-2-line"></i>
                </button>
                <div class="search-container">
                    <i class="ri-search-line"></i>
                    <input type="text" class="search-input" placeholder="Search projects, plots, or leads...">
                </div>
            </div>

            <div class="header-actions">
                <button class="icon-btn">
                    <i class="ri-notification-3-line"></i>
                    <span class="notification-badge"></span>
                </button>
                <div class="user-profile">
                    <div style="text-align: right; display: none; @media(min-width: 640px) { display: block; }">
                        <div class="text-sm font-semibold">Alex Consultants</div>
                        <div class="text-xs text-muted">Admin</div>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Alex+Consultants&background=0D8ABC&color=fff"
                        alt="User Avatar" class="avatar">
                </div>
            </div>
        </header>

        <!-- Dashboard Content Area -->
        <div class="dashboard-content">

            <div class="page-header">
                <div>
                    <h1 class="text-xl">Locations</h1>
                    <p class="text-sm mt-1">Manage global property locations and market regions.</p>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-primary" onclick="addCustomLocation()"><i class="ri-add-line"></i> New
                        Location</button>
                </div>
            </div>

            <!-- Locations Grid -->
            <div id="locationsGrid"
                style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 24px;">
                <!-- Dynamically populated by JS -->
            </div>

        </div>
    </main>

    <!-- Removed Modal for Locations Page -->

    <script>
        // JS Logic for Locations UI

        // 1. Mobile Sidebar Toggle
        document.getElementById('mobileMenuBtn').addEventListener('click', function () {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // 2. Render Locations from LocalStorage
        function renderLocations() {
            const grid = document.getElementById('locationsGrid');
            if (!grid) return;

            // Default hardcoded locations
            let defaultLocs = ['Los Angeles, CA', 'New York, NY', 'Miami, FL', 'Dubai, UAE', 'London, UK'];

            // Add any custom locations from localStorage
            let savedStr = localStorage.getItem('sr_locations');
            let savedLocs = savedStr ? JSON.parse(savedStr) : [];

            // Merge and deduplicate
            let allLocs = [...new Set([...defaultLocs, ...savedLocs])];

            grid.innerHTML = ''; // Clear grid

            allLocs.forEach(loc => {
                const card = document.createElement('div');
                card.style.cssText = `
                    background: white; 
                    border: 1px solid var(--dash-border); 
                    border-radius: var(--dash-radius); 
                    padding: 20px;
                    display: flex;
                    align-items: center;
                    gap: 16px;
                    box-shadow: var(--dash-shadow-sm);
                `;

                card.innerHTML = `
                    <div style="background: rgba(37, 99, 235, 0.1); color: var(--app-primary); width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;">
                        <i class="ri-map-pin-2-fill"></i>
                    </div>
                    <div style="flex: 1;">
                        <h3 style="font-size: 16px; font-weight: 600; color: var(--dash-text-main); margin-bottom: 2px;">${loc}</h3>
                        <p style="font-size: 13px; color: var(--dash-text-muted);">Active Market</p>
                    </div>
                    <div>
                        <button class="icon-btn small"><i class="ri-more-2-fill"></i></button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Render immediately
        renderLocations();

        // 3. Add Custom Location Function
        window.addCustomLocation = function () {
            const loc = prompt("Enter new Location Name (e.g., Tokyo, JP):");
            if (loc && loc.trim() !== "") {
                const cleanedLoc = loc.trim();
                let locsStr = localStorage.getItem('sr_locations');
                let locs = locsStr ? JSON.parse(locsStr) : [];

                if (!locs.includes(cleanedLoc)) {
                    locs.push(cleanedLoc);
                    localStorage.setItem('sr_locations', JSON.stringify(locs));
                    alert(`Location "${cleanedLoc}" added successfully!`);
                    renderLocations(); // Re-render grid instantly
                } else {
                    alert('Location already exists.');
                }
            }
        };

        // Handle dummy links
        document.querySelectorAll('a[href="#"]').forEach(el => {
            if (!el.id && !el.classList.contains('mobile-nav-toggle')) {
                el.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (el.tagName === 'A' || el.textContent.trim()) {
                        alert('Prototype: This action is disabled.');
                    }
                });
            }
        });
    </script>
</body>

</html>
